name: Deploy README preview to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "landing/readme-v2/**"
      - ".github/workflows/readme-preview-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy landing/readme-v2 --project-name=nexu-readme-review --branch=main --commit-dirty=true
